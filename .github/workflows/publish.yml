name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required for npm provenance / trusted publishing
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure npm authentication
        run: |
            if [ -z "$NPM_TOKEN" ]; then
              echo "::error::NPM_TOKEN secret is missing or empty"
              exit 1
            fi
            
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            npm whoami
        env:
            NPM_TOKEN: ${{ secrets.N8N_TOKEN }}

      - name: Release
        run: npm run release
        env:
          NPM_TOKEN: ${{ secrets.N8N_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.N8N_TOKEN }}