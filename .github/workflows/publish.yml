name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required for npm provenance / trusted publishing
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: |
          [ -n "$N8N_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$N8N_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.N8N_TOKEN }}